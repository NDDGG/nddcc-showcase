<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NDDCC Platform | See What We're Building</title>
<style>
  :root{
    --bg:#f4f7fb;
    --panel:#ffffff;
    --panel-soft:#f8fbff;
    --border:#d9e2f0;
    --text:#10233f;
    --muted:#60718f;
    --nav:#edf2ff;
    --brand:#5c5ce0;
    --brand-2:#7a59f0;
    --ok:#1fa971;
    --warn:#ef8c19;
    --risk:#d94d4d;
    --info:#2b8ae2;
    --ink:#0d1630;
    --shadow:0 12px 28px rgba(20,34,66,.08);
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
  body{overflow:hidden}

  .app{
    display:grid;
    grid-template-columns:260px 1fr;
    height:100vh;
  }

  .sidebar{
    background:#fff;
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  .brand{
    padding:26px 26px 18px;
    border-bottom:1px solid var(--border);
  }
  .brand h1{
    margin:0;
    font-size:18px;
    line-height:1.2;
    letter-spacing:.01em;
  }
  .brand p{
    margin:8px 0 0;
    color:var(--muted);
    font-size:14px;
  }

  .tour-card{
    margin:18px 20px 10px;
    padding:16px;
    border:1px solid var(--border);
    border-radius:16px;
    background:var(--nav);
  }
  .tour-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .tour-label{
    font-size:14px;
    font-weight:700;
    color:#243a76;
  }
  .btn{
    border:none;
    border-radius:999px;
    background:var(--brand);
    color:#fff;
    font-weight:700;
    padding:10px 16px;
    cursor:pointer;
    box-shadow:none;
  }
  .btn.secondary{
    background:#fff;
    color:#33476a;
    border:1px solid var(--border);
  }
  .btn.ghost{
    background:transparent;
    color:#33476a;
    border:1px solid var(--border);
  }

  .nav{
    overflow:auto;
    padding:8px 14px 24px;
  }
  .nav-group{
    margin-top:12px;
  }
  .nav-group-title{
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:#7e8cab;
    font-weight:800;
    padding:14px 14px 8px;
    border-top:1px solid #edf1f8;
  }
  .nav-item{
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    border-radius:10px;
    padding:8px 12px;
    color:#314666;
    font-size:13px;
    cursor:pointer;
    margin-bottom:2px;
    position:relative;
  }
  .nav-item:hover{background:#f5f7ff}
  .nav-item.active{
    background:#eef1ff;
    color:#293fbf;
    font-weight:700;
  }
  .nav-item.active::before{
    content:"";
    position:absolute;
    left:0;top:8px;bottom:8px;
    width:4px;border-radius:999px;
    background:var(--brand);
  }

  .main{
    min-width:0;
    height:100vh;
    overflow:auto;
  }
  .page{
    min-height:100%;
    display:flex;
    flex-direction:column;
  }

  .hero{
    background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);
    border-bottom:1px solid var(--border);
    padding:16px 24px 14px;
  }
  .hero-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
  }
  .hero h2{
    margin:0;
    font-size:20px;
    line-height:1.15;
  }
  .hero p{
    margin:6px 0 0;
    color:var(--muted);
    font-size:14px;
    max-width:980px;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    background:#eef1ff;
    color:#3d42c8;
    font-size:14px;
    border-radius:999px;
    font-weight:700;
    white-space:nowrap;
  }
  .tag-row{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .tag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:1px solid var(--border);
    background:#fff;
    color:#3d4d6b;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
  }
  .tag::before{
    content:"•";
    color:#2cb56f;
    font-size:16px;
    line-height:1;
  }

  .content{
    padding:0 20px 16px;
  }
  .content-grid{
    display:grid;
    grid-template-columns:minmax(0,1.2fr) minmax(300px,1fr);
    gap:18px;
    align-items:start;
  }

  .visual-card{
    margin-top:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:0 0 var(--radius) var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .visual-shell{
    padding:12px 12px 8px;
  }
  .visual-stage{
    width:100%;
    padding:0;
    margin:0;
    border-radius:16px;
    border:2px dashed #d3dced;
    background:#f5f8ff;
    overflow:hidden;
  }
  .visual-stage img{
    display:block;
    width:100%;
    height:auto;
    margin:0;
    vertical-align:top;
  }
  .visual-caption{
    margin-top:8px;
    text-align:right;
    color:#8291af;
    font-size:13px;
  }
  .thumb-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:8px;
  }
  .thumb{
    width:12px;height:12px;border-radius:999px;border:none;
    background:#cbd5ea;cursor:pointer;
  }
  .thumb.active{background:var(--brand)}
  .thumb-labels{
    display:flex;gap:6px;flex-wrap:wrap;margin-top:8px
  }
  .thumb-label{
    border:1px solid var(--border);
    background:#fff;
    color:#506281;
    border-radius:999px;
    padding:5px 10px;
    font-size:11px;
    cursor:pointer;
  }
  .thumb-label.active{
    background:#eef1ff;
    border-color:#c9cffd;
    color:#3948c8;
    font-weight:700;
  }

  .narrative-col{
    display:flex;
    flex-direction:column;
    gap:12px;
    padding-top:0;
    overflow-y:auto;
    scrollbar-gutter:stable;
  }
  .narrative-col::-webkit-scrollbar{width:10px;height:10px}
  .narrative-col::-webkit-scrollbar-thumb{background:#c8d3e6;border-radius:999px;border:3px solid transparent;background-clip:content-box}
  .narrative-col::-webkit-scrollbar-track{background:transparent}
  .card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 14px 12px;
    box-shadow:var(--shadow);
    flex-shrink:0;
  }
  #benefitCard {
    border-left: 4px solid var(--ok);
    background: linear-gradient(90deg, #f0faf5 0%, #fff 40%);
  }
  #connectCard {
    border-left: 4px solid var(--info);
    background: linear-gradient(90deg, #f0f6ff 0%, #fff 40%);
  }
  .eyebrow{
    margin:0 0 6px;
    color:#7f8dab;
    font-size:12px;
    letter-spacing:.09em;
    text-transform:uppercase;
    font-weight:800;
  }
  .card h3{
    margin:0 0 6px;
    font-size:17px;
    line-height:1.15;
  }
  .card p{
    margin:0;
    color:#435570;
    font-size:13px;
    line-height:1.5;
  }
  .bullets{
    margin:0;
    padding-left:16px;
    color:#334664;
    display:grid;
    gap:5px;
    font-size:13px;
    line-height:1.4;
  }
  .screens-list{
    margin:0;
    padding-left:18px;
    display:grid;
    gap:4px;
    color:#334664;
    font-size:13px;
  }

  .nav-controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .screen-count{
    color:#5f6f8d;
    font-size:14px;
  }
  .control-btn{
    min-width:80px;
    padding:7px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fff;
    cursor:pointer;
    font-weight:700;
    font-size:12px;
    color:#24395f;
  }

  /* infographic styles */
  .infographic{
    padding:22px;
    display:grid;
    gap:18px;
  }
  .metric-grid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:14px;
  }
  .metric{
    border:1px solid var(--border);
    border-radius:16px;
    background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);
    padding:16px;
  }
  .metric .kicker{
    color:#8090ac;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.08em;
    font-weight:800;
  }
  .metric .value{
    margin-top:8px;
    font-size:34px;
    line-height:1;
    font-weight:800;
  }
  .metric .desc{
    margin-top:8px;
    color:#5b6d89;
    font-size:14px;
    line-height:1.4;
  }

  .diagram{
    border:1px solid var(--border);
    border-radius:18px;
    background:#fff;
    padding:18px;
  }
  .diagram h4{
    margin:0 0 14px;
    font-size:18px;
  }
  .flow-grid{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:14px;
    align-items:stretch;
  }
  .flow-box{
    border-radius:16px;
    padding:16px;
    color:#fff;
    min-height:128px;
  }
  .flow-box h5{
    margin:0 0 10px;
    font-size:16px;
  }
  .flow-box p{
    margin:0;
    color:rgba(255,255,255,.92);
    font-size:14px;
    line-height:1.45;
  }
  .f1{background:linear-gradient(135deg,#4057d6,#6e72ff)}
  .f2{background:linear-gradient(135deg,#2f8ae6,#44b5ff)}
  .f3{background:linear-gradient(135deg,#1fa971,#3ac58f)}
  .f4{background:linear-gradient(135deg,#7b59f0,#9e7dff)}
  .f5{background:linear-gradient(135deg,#ef8c19,#ffaf3f)}
  .f6{background:linear-gradient(135deg,#cc4f4f,#f26e6e)}

  .two-col{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:14px;
  }
  .stack-note{
    border-left:4px solid var(--brand);
    background:#f7f8ff;
    padding:14px 14px 14px 16px;
    border-radius:14px;
    color:#334664;
    font-size:15px;
    line-height:1.5;
  }
  .mini-list{
    margin:0;
    padding-left:18px;
    display:grid;
    gap:6px;
    color:#334664;
    font-size:14px;
    line-height:1.45;
  }
  .assure-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:14px;
  }
  .assure-box{
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    background:#fff;
  }
  .assure-box h5{
    margin:0 0 8px;
    font-size:16px;
  }
  .assure-box p{
    margin:0;
    color:#51637f;
    font-size:14px;
    line-height:1.45;
  }

  .footer-bar{
    position:sticky;
    bottom:0;
    z-index:5;
    margin-top:auto;
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--border);
    padding:6px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .footer-left,.footer-right{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .tiny{
    font-size:13px;color:#6f809f;
  }

  .status-dot{
    width:10px;height:10px;border-radius:999px;background:var(--ok);display:inline-block;margin-right:8px
  }

  @media (max-width: 1220px){
    .content-grid{grid-template-columns:1fr}
    .narrative-col{padding-top:0}
  }
  @media (max-width: 980px){
    .app{grid-template-columns:1fr}
    .sidebar{display:none}
    body{overflow:auto}
    .main{height:auto;overflow:visible}
    .metric-grid,.flow-grid,.assure-grid,.two-col{grid-template-columns:1fr}
    .footer-bar{position:static}
  }

  .sidebar{min-height:0}
  .nav{scrollbar-gutter:stable;overscroll-behavior:contain}
  .nav::-webkit-scrollbar,.visual-stage::-webkit-scrollbar,.right-pane::-webkit-scrollbar{width:12px;height:12px}
  .nav::-webkit-scrollbar-thumb,.visual-stage::-webkit-scrollbar-thumb,.right-pane::-webkit-scrollbar-thumb{background:#c8d3e6;border-radius:999px;border:3px solid transparent;background-clip:content-box}
  .nav::-webkit-scrollbar-track,.visual-stage::-webkit-scrollbar-track,.right-pane::-webkit-scrollbar-track{background:transparent}
  .main{overflow:hidden}
  .page{height:100vh;min-height:0}
  .content{flex:1;min-height:0;overflow:hidden}
  .content-grid{height:100%;min-height:0;align-items:stretch}
  .visual-card{height:100%;display:flex;flex-direction:column}
  .visual-shell{height:100%;display:flex;flex-direction:column;min-height:0}
  .visual-stage{flex:1;min-height:0;overflow:auto;scrollbar-gutter:stable;display:flex;align-items:flex-start;justify-content:center}
  .visual-stage img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain}
  .selector-wrap{height:100%;overflow:auto;padding:22px;scrollbar-gutter:stable}
  .selector-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:18px}
  .selector-toolbar button,.selector-actions button{border:1px solid var(--border);background:#fff;border-radius:12px;padding:10px 14px;font-weight:700;color:#33476a;cursor:pointer}
  .selector-toolbar button.primary,.selector-actions button.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .selector-toolbar .summary{color:#5f6f8d;font-size:14px;font-weight:700}
  .selector-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:18px}
  .selector-card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;cursor:pointer;user-select:none;transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease}
  .selector-card.selected{background:#f7f9ff;border-color:#b8c2ff;box-shadow:0 10px 24px rgba(61,66,200,.10)}
  .selector-card:hover{border-color:#b8c2ff;transform:translateY(-1px)}
  .selector-card label{display:flex;gap:12px;align-items:flex-start;cursor:pointer}
  .selector-card input{margin-top:4px}
  .selector-card h3{margin:0;font-size:18px;line-height:1.2}
  .selector-card p{margin:0;color:#435570;font-size:14px;line-height:1.5}
  .selector-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto}
  .selector-tag{border:1px solid var(--border);background:#eef1ff;color:#3948c8;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700}
  .selector-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  .control-btn:disabled,.btn:disabled{opacity:.55;cursor:not-allowed}
  @media (max-width: 980px){
    .selector-grid{grid-template-columns:1fr}
    .main{overflow:auto}
    .page{height:auto}
    .content{overflow:visible}
    .content-grid{height:auto}
    .visual-card,.visual-shell,.visual-stage{height:auto;max-height:none}
  }

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>NDDCC Platform</h1>
      <p>See what we're building for children, families, and the professionals who support them</p>
    </div>
    <nav class="nav" id="sidebarNav"></nav>
  </aside>

  <main class="main">
    <div class="page">
      <section class="hero">
        <div class="hero-top">
          <div>
            <h2 id="heroTitle">NDDCC Showcase</h2>
            <p id="heroSubtitle"></p>
          </div>
          <div class="pill" id="heroPill">Platform overview</div>
        </div>
        <div class="tag-row" id="heroTags"></div>
      </section>

      <section class="content">
        <div class="content-grid">
          <div class="visual-card">
            <div class="visual-shell">
              <div class="visual-stage" id="visualStage"></div>
              <div class="visual-caption" id="visualCaption"></div>
              <div class="thumb-labels" id="thumbLabels"></div>
              <div class="thumb-row" id="thumbDots"></div>
            </div>
          </div>

          <div class="narrative-col">
            <div class="card">
              <div class="eyebrow">Executive narrative</div>
              <h3 id="narrativeTitle"></h3>
              <p id="narrativeText"></p>
            </div>

            <div class="card" id="benefitCard">
              <div class="eyebrow">What this means for you</div>
              <p id="benefitText" style="color:#2d3e58;line-height:1.6;font-weight:600"></p>
            </div>

            <div class="card" id="connectCard">
              <div class="eyebrow">How it connects</div>
              <p id="connectText" style="color:#435570;line-height:1.6"></p>
            </div>

            <div class="card">
              <div class="eyebrow">Why it matters</div>
              <ul class="bullets" id="whyList"></ul>
            </div>

            <div class="card">
              <div class="eyebrow">Screens in this slide</div>
              <ol class="screens-list" id="screensList"></ol>
            </div>

            <div class="card">
              <div class="nav-controls">
                <button class="control-btn" id="prevScreenBtn">Previous screen</button>
                <div class="screen-count" id="screenCount"></div>
                <button class="control-btn" id="nextScreenBtn">Next screen</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="footer-bar">
        <div class="footer-left">
          <span class="tiny"><span class="status-dot"></span>NDDCC Platform Showcase</span>
          <span class="tiny" id="pathHint">Built with care in the UK</span>
        </div>
        <div class="footer-right">
        </div>
      </div>
    </div>
  </main>
</div>

function expandVariants(name){
  const names = new Set();
  names.add(name);
  names.add(name.replace(/ /g, "%20"));
  names.add(name.replace(/ /g, "_"));
  names.add(name.replace(/_/g, " "));
  names.add(name.replace(/-/g, " "));
  names.add(name.replace(/\s+/g, ""));
  names.add(name.replace(/ /g, "-"));
  names.add(name.replace(/([a-z])([A-Z])/g, "$1 $2"));
  names.add(name.replace(/([a-z])([A-Z])/g, "$1_$2"));
  return [...names];
}

function buildCandidates(files){
  const out = [];
  files.forEach(file=>{
    const pool = new Set([file, ...(imageAliases[file] || [])]);
    [...pool].forEach(base=>{
      expandVariants(base).forEach(v=>{
        imageRoots.forEach(root=> out.push(root + v));
      });
    });
  });
  return [...new Set(out)];
}

function findWorkingImage(candidates){
  return new Promise((resolve)=>{
    let idx = 0;
    function tryNext(){
      if(idx >= candidates.length){ resolve(null); return; }
      const src = candidates[idx++];
      const img = new Image();
      img.onload = ()=> resolve(src);
      img.onerror = ()=> tryNext();
      img.src = src;
    }
    tryNext();
  });
}

let state = { slideIndex: 0, screenIndex: 0 };

const FIXED_LEAD_IDS = ["coordination-reality","standards-assurance","safeguarding-consent","portal-selector"];
const SELECTABLE_PORTAL_IDS = slides.map(s=>s.id).filter(id=>!FIXED_LEAD_IDS.includes(id));
const DEFAULT_PORTAL_SELECTION = ["child","parent","teacher","senco","local-authority","navigator","analytics"];
let selectedPortalIds = [];
let activeSlides = [];

function buildActiveSlides(){
  const fixed = FIXED_LEAD_IDS.map(id=>slides.find(s=>s.id===id)).filter(Boolean);
  const chosen = selectedPortalIds.map(id=>slides.find(s=>s.id===id)).filter(Boolean);
  activeSlides = [...fixed, ...chosen];
}

function makeNav(){
  const nav = document.getElementById("sidebarNav");
  const grouped = {};
  activeSlides.forEach((s, i)=>{
    if (SELECTABLE_PORTAL_IDS.includes(s.id) && !selectedPortalIds.includes(s.id)) return;
    if(!grouped[s.group]) grouped[s.group] = [];
    grouped[s.group].push({ ...s, i });
  });
  nav.innerHTML = "";
  Object.entries(grouped).forEach(([group, items])=>{
    const wrapper = document.createElement("div");
    wrapper.className = "nav-group";
    wrapper.innerHTML = `<div class="nav-group-title">${group}</div>`;
    items.forEach(item=>{
      const btn = document.createElement("button");
      btn.className = "nav-item";
      btn.textContent = item.title;
      btn.onclick = ()=> goToSlide(item.i);
      btn.dataset.index = item.i;
      wrapper.appendChild(btn);
    });
    nav.appendChild(wrapper);
  });
}

function updateNavActive(){
  document.querySelectorAll(".nav-item").forEach(el=>{
    el.classList.toggle("active", Number(el.dataset.index) === state.slideIndex);
  });
  const activeBtn = document.querySelector(`.nav-item[data-index="${state.slideIndex}"]`);
  if (activeBtn) activeBtn.scrollIntoView({block:"nearest"});
}

function clampActiveSlideAfterSelection(previousSlideId){
  const nextIndex = activeSlides.findIndex(s => s.id === previousSlideId);
  if (nextIndex >= 0) {
    state.slideIndex = nextIndex;
  } else {
    const selectorIndex = activeSlides.findIndex(s => s.id === "portal-selector");
    state.slideIndex = selectorIndex >= 0 ? selectorIndex : 0;
  }
  state.screenIndex = 0;
}

function setSelection(ids){
  const previousSlideId = activeSlides[state.slideIndex]?.id || "portal-selector";
  selectedPortalIds = ids.filter(id=>SELECTABLE_PORTAL_IDS.includes(id));
  buildActiveSlides();
  clampActiveSlideAfterSelection(previousSlideId);
  makeNav();
  renderSlide();
}

function togglePortal(id, force){
  const exists = selectedPortalIds.includes(id);
  const next = typeof force === 'boolean' ? force : !exists;
  const previousSlideId = activeSlides[state.slideIndex]?.id || "portal-selector";
  if (next && !exists) selectedPortalIds = [...selectedPortalIds, id];
  if (!next && exists) selectedPortalIds = selectedPortalIds.filter(x=>x!==id);
  buildActiveSlides();
  clampActiveSlideAfterSelection(previousSlideId);
  makeNav();
  renderSlide();
}

function renderPortalSelector(){
  const stage = document.getElementById("visualStage");
  const portalSlides = slides.filter(s=>SELECTABLE_PORTAL_IDS.includes(s.id));
  const count = selectedPortalIds.length;
  stage.innerHTML = `
    <div class="selector-wrap">
      <div class="eyebrow">Audience-led walkthrough</div>
      <h3 style="margin:0 0 10px;font-size:24px;line-height:1.2;">Choose which parts of the platform to explore</h3>
      <p style="margin:0;color:#435570;font-size:16px;line-height:1.55;max-width:900px;">Pick the areas that matter most to you. Each portal is built for a specific role — select the ones you'd like to learn about.</p>
      <div class="selector-toolbar">
        <button type="button" data-select-action="parent-carer" class="primary">I'm a Parent or Carer</button>
        <button type="button" data-select-action="teacher-senco">I'm a Teacher or SENCO</button>
        <button type="button" data-select-action="social-care">I'm in Social Care</button>
        <button type="button" data-select-action="school-leader">I'm a School Leader</button>
        <button type="button" data-select-action="all">Show me everything</button>
        <button type="button" data-select-action="clear">Clear</button>
        <div class="summary">${count} portal${count === 1 ? '' : 's'} selected</div>
      </div>
      <div class="selector-grid">
        ${portalSlides.map(slide => {
          const selected = selectedPortalIds.includes(slide.id);
          const screenCount = (slide.images || []).length || 1;
          return `
            <div class="selector-card${selected ? ' selected' : ''}" data-portal-card="${slide.id}">
              <label>
                <input type="checkbox" data-portal-toggle="${slide.id}" ${selected ? 'checked' : ''}>
                <div>
                  <h3>${slide.title}</h3>
                  <p>${slide.subtitle}</p>
                </div>
              </label>
              <div class="selector-meta">
                <span class="selector-tag">${slide.pill}</span>
                <span class="selector-tag">${screenCount} screen${screenCount === 1 ? '' : 's'}</span>
              </div>
            </div>`;
        }).join('')}
      </div>
      <div class="selector-actions">
        <button type="button" class="primary" id="applyPortalSelection" ${count ? '' : 'disabled'}>${count ? 'Explore selected portals' : 'Select at least one portal to continue'}</button>
      </div>
    </div>`;

  document.getElementById("visualCaption").textContent = "";
  document.getElementById("thumbDots").innerHTML = "";
  document.getElementById("thumbLabels").innerHTML = "";
  document.getElementById("screenCount").textContent = "Selection screen";
  document.getElementById("prevScreenBtn").disabled = true;
  document.getElementById("nextScreenBtn").disabled = true;

  stage.querySelectorAll('[data-portal-toggle]').forEach(input=>{
    input.addEventListener('click', e=> e.stopPropagation());
    input.addEventListener('change', e=> togglePortal(e.target.getAttribute('data-portal-toggle'), e.target.checked));
  });
  stage.querySelectorAll('[data-portal-card]').forEach(card=>{
    card.addEventListener('click', e=>{
      if (e.target.closest('button')) return;
      togglePortal(card.getAttribute('data-portal-card'));
    });
  });
  stage.querySelectorAll('[data-select-action]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const action = btn.getAttribute('data-select-action');
      if (action === 'all') setSelection([...SELECTABLE_PORTAL_IDS]);
      if (action === 'parent-carer') setSelection(["child","child-in-care","parent","teacher","school"]);
      if (action === 'teacher-senco') setSelection(["teacher","school","senco","parent"]);
      if (action === 'social-care') setSelection(["social-services","foster-home","child-in-care","local-authority"]);
      if (action === 'school-leader') setSelection(["school","senco","teacher","local-authority"]);
      if (action === 'clear') setSelection([]);
    });
  });
  const apply = stage.querySelector('#applyPortalSelection');
  if (apply) apply.addEventListener('click', ()=>{
    if (!selectedPortalIds.length) return;
    const selectorIndex = activeSlides.findIndex(s=>s.id==='portal-selector');
    goToSlide(Math.min(selectorIndex + 1, activeSlides.length - 1));
  });
}

async function renderSlide(){
  const slide = activeSlides[state.slideIndex];
  document.getElementById("heroTitle").textContent = slide.title;
  document.getElementById("heroSubtitle").textContent = slide.subtitle;
  document.getElementById("heroPill").textContent = slide.pill;

  const heroTags = document.getElementById("heroTags");
  heroTags.innerHTML = "";
  slide.tags.forEach(t=>{
    const el = document.createElement("span");
    el.className = "tag";
    el.textContent = t;
    heroTags.appendChild(el);
  });

  document.getElementById("narrativeTitle").textContent = slide.narrativeTitle;
  document.getElementById("narrativeText").textContent = slide.narrativeText;

  const whyList = document.getElementById("whyList");
  whyList.innerHTML = slide.why.map(x=>`<li>${x}</li>`).join("");

  const screensList = document.getElementById("screensList");
  screensList.innerHTML = slide.screens.map(x=>`<li>${x}</li>`).join("");

  // Update benefit and connection cards
  const benefits = slide.benefits || [];
  const connections = slide.connections || [];
  document.getElementById("benefitText").textContent = benefits[state.screenIndex] || benefits[0] || "";
  document.getElementById("connectText").textContent = connections[state.screenIndex] || connections[0] || "";
  document.getElementById("benefitCard").style.display = benefits.length ? "block" : "none";
  document.getElementById("connectCard").style.display = connections.length ? "block" : "none";

  updateNavActive();

  const stage = document.getElementById("visualStage");
  const caption = document.getElementById("visualCaption");
  const dots = document.getElementById("thumbDots");
  const labels = document.getElementById("thumbLabels");
  stage.innerHTML = "";
  caption.textContent = "";
  dots.innerHTML = "";
  labels.innerHTML = "";

  if(slide.mode === "selector"){
    document.getElementById("benefitCard").style.display = "none";
    document.getElementById("connectCard").style.display = "none";
    renderPortalSelector();
    return;
  }

  if(slide.mode === "infographic"){
    document.getElementById("screenCount").textContent = "Infographic section";
    document.getElementById("prevScreenBtn").disabled = true;
    document.getElementById("nextScreenBtn").disabled = true;
    document.getElementById("benefitCard").style.display = "none";
    document.getElementById("connectCard").style.display = "none";
    stage.innerHTML = slide.render();
    return;
  }

  const total = slide.images.length;
  state.screenIndex = Math.max(0, Math.min(state.screenIndex, total - 1));
  document.getElementById("screenCount").textContent = `Screen ${state.screenIndex + 1} of ${total}`;
  document.getElementById("prevScreenBtn").disabled = total <= 1;
  document.getElementById("nextScreenBtn").disabled = total <= 1;

  slide.images.forEach((name, idx)=>{
    const d = document.createElement("button");
    d.className = "thumb" + (idx === state.screenIndex ? " active" : "");
    d.onclick = ()=> { state.screenIndex = idx; renderSlide(); };
    dots.appendChild(d);

    const l = document.createElement("button");
    l.className = "thumb-label" + (idx === state.screenIndex ? " active" : "");
    l.textContent = slide.screens[idx] || `Screen ${idx+1}`;
    l.onclick = ()=> { state.screenIndex = idx; renderSlide(); };
    labels.appendChild(l);
  });

  const target = slide.images[state.screenIndex];
  const candidates = buildCandidates([target]);
  const working = await findWorkingImage(candidates);
  if(working){
    const img = document.createElement("img");
    img.src = working;
    img.alt = slide.title + " screenshot";
    stage.appendChild(img);
    caption.textContent = target;
  } else {
    stage.innerHTML = `
      <div style="padding:34px; display:grid; gap:16px;">
        <div style="font-size:22px;font-weight:800;color:#24395f;">Image not found</div>
        <div style="color:#556884; font-size:15px; line-height:1.5;">
          Could not load <strong>${target}</strong>.<br>
          Place images in the same folder as this HTML, or inside <strong>Final Pic Set</strong>, <strong>images</strong>, or <strong>assets</strong>.
        </div>
        <div style="border:1px solid var(--border); background:#fff; border-radius:14px; padding:14px;">
          <div style="font-size:13px;color:#7f8dab;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:8px;">Tried paths</div>
          <div style="font-family:Consolas,monospace;font-size:12px;color:#3c4c67;line-height:1.5;word-break:break-all;">${candidates.join("<br>")}</div>
        </div>
      </div>`;
    caption.textContent = "Missing local image";
  }
}

function goToSlide(index){
  state.slideIndex = (index + activeSlides.length) % activeSlides.length;
  state.screenIndex = 0;
  renderSlide();
}

function nextSlide(){ goToSlide(state.slideIndex + 1); }
function prevSlide(){ goToSlide(state.slideIndex - 1); }

function nextScreen(){
  const slide = activeSlides[state.slideIndex];
  if(slide.mode === "selector"){
    if (selectedPortalIds.length) nextSlide();
    return;
  }
  if(slide.mode === "infographic"){ nextSlide(); return; }
  if(state.screenIndex < slide.images.length - 1){
    state.screenIndex += 1;
    renderSlide();
  }else{
    nextSlide();
  }
}
function prevScreen(){
  const slide = activeSlides[state.slideIndex];
  if(slide.mode === "selector" || slide.mode === "infographic"){ prevSlide(); return; }
  if(state.screenIndex > 0){
    state.screenIndex -= 1;
    renderSlide();
  }else{
    prevSlide();
  }
}

document.getElementById("prevScreenBtn").onclick = prevScreen;
document.getElementById("nextScreenBtn").onclick = nextScreen;

document.addEventListener("keydown", (e)=>{
  if(e.key === "ArrowRight") nextScreen();
  if(e.key === "ArrowLeft") prevScreen();
});

buildActiveSlides();
makeNav();
renderSlide();
</script>
